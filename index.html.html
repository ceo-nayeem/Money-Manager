<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitos - Fitness Tracker</title>
    <style>
        /* আপনার অরিজিনাল CSS কোড এখানে থাকবে */
        /* (সংক্ষেপিত: আমি আপনার দেওয়া ফাইলের সব ডিজাইন ঠিক রেখেছি) */
    </style>
</head>
<body>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // আপনার দেওয়া কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyC8y4IYzcU_T3CQ4LfZsZH6a-kmVx7UlsI",
            authDomain: "transform-v1.firebaseapp.com",
            projectId: "transform-v1",
            storageBucket: "transform-v1.firebasestorage.app",
            messagingSenderId: "552977260205",
            appId: "1:552977260205:web:c43346ab972d2d72ed3024"
        };

        // Firebase ইনিশিয়ালাইজ করা
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // একটি নির্দিষ্ট ডকুমেন্ট আইডি (যাতে আপনি সব ডিভাইস থেকে এক ডেটা পান)
        const docRef = doc(db, "app_data", "user_selection");

        // ১. ডাটাবেস থেকে রিয়েলটাইম ডেটা পড়া (Listen for updates)
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                updateUI(data);
            }
        });

        // ২. UI আপডেট করার ফাংশন
        function updateUI(data) {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach((cb) => {
                const label = cb.closest('.option-item')?.querySelector('span')?.innerText;
                if (label && data.features && data.features[label] !== undefined) {
                    cb.checked = data.features[label];
                }
            });
            // সিলেক্টেড সংখ্যা আপডেট
            const selectedCount = Object.values(data.features || {}).filter(v => v === true).length;
            const countText = document.querySelector('.footer-left');
            if (countText) countText.innerText = `${selectedCount} selected`;
        }

        // ৩. যেকোনো চেঞ্জ হলে ডাটাবেসে সেভ করা
        document.addEventListener('change', async (e) => {
            if (e.target.type === 'checkbox') {
                const checkboxes = document.querySelectorAll('input[type="checkbox"]');
                let features = {};

                checkboxes.forEach((cb) => {
                    const label = cb.closest('.option-item')?.querySelector('span')?.innerText;
                    if (label) {
                        features[label] = cb.checked;
                    }
                });

                // Firebase-এ ডেটা পাঠানো
                try {
                    await setDoc(docRef, { features }, { merge: true });
                    console.log("Realtime Sync Successful!");
                } catch (error) {
                    console.error("Error updating Firebase:", error);
                }
            }
        });
    </script>
</body>
</html>
